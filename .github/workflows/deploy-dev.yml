name: Deploy to Dev Org

on:
  push:
    branches:
      - develop

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy-dev:
    name: Deploy to Dev Org
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Cache Node modules
        uses: actions/cache@v4
        id: cache-sf-cli
        with:
          path: ~/.npm-global
          key: sf-cli-${{ runner.os }}

      - name: Install Salesforce CLI
        if: steps.cache-sf-cli.outputs.cache-hit != 'true'
        run: |
          npm install --global @salesforce/cli
          echo "$(npm global bin)" >> $GITHUB_PATH

      - name: Add SF CLI to PATH
        if: steps.cache-sf-cli.outputs.cache-hit == 'true'
        run: echo "$(npm global bin)" >> $GITHUB_PATH

      - name: Authenticate Dev Org
        run: |
          echo "${{ secrets.SF_AUTH_URL_DEV }}" > dev-auth.txt
          sf org login sfdx-url --sfdx-url-file dev-auth.txt --alias dev-org
          rm dev-auth.txt

      - name: Get changed files
        run: |
          git diff --name-only HEAD~1...HEAD > changed_files.txt
          echo "Changed files in this deployment:"
          cat changed_files.txt

      - name: Generate delta package
        run: |
          echo '<?xml version="1.0" encoding="UTF-8"?>' > delta-package.xml
          echo '<Package xmlns="http://soap.sforce.com/2006/04/metadata">' >> delta-package.xml
          echo '    <version>59.0</version>' >> delta-package.xml

          HAS_APEX=false
          HAS_FIELDS=false
          HAS_PERMSETS=false
          HAS_LWC=false

          while IFS= read -r file; do
            if [[ $file == force-app/main/default/classes/*.cls && $file != *-meta.xml ]]; then
              HAS_APEX=true
            fi
            if [[ $file == force-app/main/default/objects/*/fields/*.field-meta.xml ]]; then
              HAS_FIELDS=true
            fi
            if [[ $file == force-app/main/default/permissionsets/*.permissionset-meta.xml ]]; then
              HAS_PERMSETS=true
            fi
            if [[ $file == force-app/main/default/lwc/* ]]; then
              HAS_LWC=true
            fi
          done < changed_files.txt

          if [ "$HAS_APEX" = true ]; then
            echo '    <types>' >> delta-package.xml
            while IFS= read -r file; do
              if [[ $file == force-app/main/default/classes/*.cls && $file != *-meta.xml ]]; then
                CLASS=$(basename "$file" .cls)
                echo "        <members>$CLASS</members>" >> delta-package.xml
              fi
            done < changed_files.txt
            echo '        <name>ApexClass</name>' >> delta-package.xml
            echo '    </types>' >> delta-package.xml
          fi

          if [ "$HAS_FIELDS" = true ]; then
            echo '    <types>' >> delta-package.xml
            while IFS= read -r file; do
              if [[ $file == force-app/main/default/objects/*/fields/*.field-meta.xml ]]; then
                FIELD=$(basename "$file" .field-meta.xml)
                OBJECT=$(echo "$file" | awk -F'/' '{print $6}')
                echo "        <members>$OBJECT.$FIELD</members>" >> delta-package.xml
              fi
            done < changed_files.txt
            echo '        <name>CustomField</name>' >> delta-package.xml
            echo '    </types>' >> delta-package.xml
          fi

          if [ "$HAS_PERMSETS" = true ]; then
            echo '    <types>' >> delta-package.xml
            while IFS= read -r file; do
              if [[ $file == force-app/main/default/permissionsets/*.permissionset-meta.xml ]]; then
                PERMSET=$(basename "$file" .permissionset-meta.xml)
                echo "        <members>$PERMSET</members>" >> delta-package.xml
              fi
            done < changed_files.txt
            echo '        <name>PermissionSet</name>' >> delta-package.xml
            echo '    </types>' >> delta-package.xml
          fi

          if [ "$HAS_LWC" = true ]; then
            echo '    <types>' >> delta-package.xml
            while IFS= read -r file; do
              if [[ $file == force-app/main/default/lwc/* ]]; then
                LWC=$(echo "$file" | awk -F'/' '{print $7}')
                echo "        <members>$LWC</members>" >> delta-package.xml
              fi
            done < changed_files.txt
            echo '        <name>LightningComponentBundle</name>' >> delta-package.xml
            echo '    </types>' >> delta-package.xml
          fi

          echo '</Package>' >> delta-package.xml
          echo "Generated delta-package.xml:"
          cat delta-package.xml

      - name: Deploy delta to Dev Org
        run: |
          sf project deploy start \
            --target-org dev-org \
            --manifest delta-package.xml \
            --test-level RunLocalTests \
            --verbose

      - name: Post deploy summary
        run: |
          echo "================================"
          echo "Deployment Summary"
          echo "================================"
          echo "Target:      Dev Org"
          echo "Branch:      ${{ github.ref }}"
          echo "Commit:      ${{ github.sha }}"
          echo "Triggered by: ${{ github.actor }}"
          echo "Timestamp:   $(date)"
          echo "================================"
          sf org display --target-org dev-org